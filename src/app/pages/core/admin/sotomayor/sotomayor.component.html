<form [formGroup]="forms" (ngSubmit)="onSubmit()" novalidate>

  <div>
    <label for="nombre">Nombre</label>
    <input id="nombre" type="text" formControlName="nombre" />
    <small *ngIf="campoInvalido('nombre')">El nombre es obligatorio.</small>
  </div>

  <div>
    <label for="email">Email</label>
    <input id="email" type="email" formControlName="email" />
    <small *ngIf="campoInvalido('email')">Ingresa un email válido.</small>
  </div>

  <div>
    <label for="edad">Edad</label>
    <input id="edad" type="number" formControlName="edad" />
    <small *ngIf="campoInvalido('edad')">Debes tener al menos 18 años.</small>
  </div>

  <div>
    <label for="password">Contraseña</label>
    <input id="password" type="password" formControlName="password" />
    <small *ngIf="campoInvalido('password')">Mínimo 6 caracteres.</small>
  </div>

  <div>
  <label for="confirmPassword">Confirmar Contraseña</label>
  <input id="confirmPassword" type="password" formControlName="confirmPassword" />
  <small *ngIf="forms.hasError('passwordsNoMatch') && forms.get('confirmPassword')?.touched">
    Las contraseñas no coinciden.
  </small>
</div>


  <button type="submit" [disabled]="forms.invalid">Registrar</button>
</form>
