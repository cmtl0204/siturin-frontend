<p-toast></p-toast>

<div class="card">
  <div class="flex justify-content-between align-items-center mb-3">
    <h2>Roles</h2>
    <button pButton type="button" label="Nuevo Rol" icon="pi pi-plus" (click)="openNew()"></button>
  </div>
  <p-table [value]="roles">
    <ng-template pTemplate="header">
      <tr>
        <th>Código</th>
        <th>Nombre</th>
        <th>Acciones</th>
      </tr>
    </ng-template>
    <ng-template pTemplate="body" let-role>
      <tr>
        <td>{{role.code}}</td>
        <td>{{role.name}}</td>
        <td>
          <button pButton icon="pi pi-pencil" class="p-button-rounded p-button-text" (click)="openEdit(role)"></button>
          <button pButton icon="pi pi-trash" class="p-button-rounded p-button-text p-button-danger" (click)="deleteRole(role)"></button>
        </td>
      </tr>
    </ng-template>
  </p-table>
</div>

<p-dialog header="{{isEdit ? 'Editar Rol' : 'Nuevo Rol'}}" [(visible)]="displayModal" [modal]="true" [closable]="false" [responsive]="true" [style]="{width: '350px'}">
  <form [formGroup]="roleForm" (ngSubmit)="saveRole()">
    <div class="p-fluid">
      <div class="field">
        <label for="code">Código</label>
        <input id="code" type="text" pInputText formControlName="code" [readonly]="isEdit"/>
      </div>
      <div class="field">
        <label for="name">Nombre</label>
        <input id="name" type="text" pInputText formControlName="name"/>
      </div>
    </div>
    <div class="flex justify-content-end mt-3">
      <button pButton type="button" label="Cancelar" class="p-button-text" (click)="displayModal=false"></button>
      <button pButton type="submit" label="Guardar" [disabled]="roleForm.invalid"></button>
    </div>
  </form>
</p-dialog>
