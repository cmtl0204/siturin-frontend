<!-- Capacidad en número de personas -->
<p-fluid>
    <form [formGroup]="form" class="card flex flex-col gap-6 w-full">
        <div class="grid grid-cols-1 md:grid-cols-12 gap-6 -mt-12"> 
            <div class="md:col-span-12 flex flex-col gap-2">
                <label appLabel for="capacidad"
                    label="Capacidad en número de personas"
                    [required]="form.controls['capacidadPersonas']">
                </label>
                <p-inputNumber inputId="capacity" formControlName="totalCapacities" 
                    [showButtons]="true" [min]="0" [max]="500" class="w-full custom-inputnumber">
                </p-inputNumber>
                <p-message appErrorMessage 
                    [errors]="form.controls['totalCapacities'].errors" 
                    [touched]="form.controls['totalCapacities'].touched" 
                    [dirty]="form.controls['totalCapacities'].dirty">
                </p-message>
            </div>
        </div>
    </form>
</p-fluid>
