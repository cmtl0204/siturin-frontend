<!-- LOCALIDAD -->
<p-fluid>
    <form [formGroup]="form" class="card flex flex-col gap-6 w-full">
        <div class="grid grid-cols-1 md:grid-cols-12 gap-4">
            <div class="md:col-span-12 flex flex-col gap-2">
                <label appLabel for="localidad" 
                    label="Su local es"
                    [required]="localityField">
                </label>
                <p-select id="locality" [options]="locality" optionLabel="name" placeholder="Seleccione"
                    formControlName="locality" [required]="true">
                </p-select>
                <p-message appErrorMessage 
                  [errors]="localityField.errors" 
                  [touched]="localityField.touched"
                  [dirty]="localityField.dirty">
                </p-message>
            </div>
        </div>

        <div class="grid grid-cols-1 md:grid-cols-12 gap-4"> 
      <!-- establecimiento -->
      <div class="md:col-span-6 flex flex-col gap-2" *ngIf="localityField.value">
        <label appLabel for="establishment" 
          label="Su establecimiento se encuentra dentro del Subsistema Estatal del Sistema Nacional de Áreas Protegidas" 
          [required]="establishmentField"></label>
        <p-toggleSwitch id="establishment" formControlName="establishmentId"></p-toggleSwitch>
        <p-message appErrorMessage [errors]="establishmentField.errors" 
          [touched]="establishmentField.touched" [dirty]="establishmentField.dirty"></p-message>
      </div>

      <!-- inspeccion -->
      <div class="md:col-span-6 flex flex-col gap-2" *ngIf="showInspection">
        <label appLabel for="inspeccion" 
          label="Al momento de la inspección se presentará la delegación por contrato, convenio de cooperación de infraestructura o permisos correspondientes emitido por la Autoridad Ambiental Nacional o su equivalente" 
          [required]="inspectionField"></label>
        <p-toggleswitch id="inspection" formControlName="inspection"></p-toggleswitch>
        <p-message appErrorMessage [errors]="inspectionField.errors" 
          [touched]="inspectionField.touched" [dirty]="inspectionField.dirty"></p-message>
      </div>
    </div>
    </form>
    
</p-fluid>
