<p-fluid>
    <form [formGroup]="form" class="card flex flex-col gap-6 w-full">
        <div class="font-semibold text-xl">
            Seleccione la Actividad y/o Modalidad Turística; clasificación y categoría de ser el caso
        </div>

        <div class="grid grid-cols-1 md:grid-cols-12 gap-6">
            <!-- zone -->
            <div class="md:col-span-3 flex flex-col gap-2">
                <label appLabel for="zone" label="Zona Geográfica" [required]="geographicAreaField">
                </label>

                <p-select
                    dataKey="id"
                    id="zone"
                    [options]="geographicAreas"
                    optionLabel="name"
                    placeholder="Seleccione"
                    formControlName="geographicArea"
                    [required]="true" />

                <p-message
                    appErrorMessage
                    [errors]="geographicAreaField.errors"
                    [touched]="geographicAreaField.touched"
                    [dirty]="geographicAreaField.dirty">
                </p-message>
            </div>

            <!-- activity -->
            <div class="md:col-span-3 flex flex-col gap-2">
                <label appLabel for="activity" label="Actividad" [required]="activityField">
                </label>

                <p-select
                    id="actividad"
                    [options]="activities"
                    optionLabel="name"
                    placeholder="Seleccione"
                    formControlName="activity"
                    [required]="true" />

                <p-message appErrorMessage [errors]="activityField.errors" [touched]="activityField.touched"
                           [dirty]="activityField.dirty">
                </p-message>
            </div>

            <!-- classification -->
            <div class="md:col-span-3 flex flex-col gap-2">
                <label appLabel for="classification" label="Clasificación" [required]="classificationField">
                </label>

                <p-select
                    id="clasificacion"
                    [options]="classifications"
                    optionLabel="name"
                    placeholder="Seleccione"
                    formControlName="classification"
                    [required]="true" />

                <p-message appErrorMessage [errors]="classificationField.errors" [touched]="classificationField.touched"
                           [dirty]="classificationField.dirty">
                </p-message>
            </div>

            <!-- category -->
            <div class="md:col-span-3 flex flex-col gap-2">
                <label appLabel for="category" label="Categoría" [required]="categoryField">
                </label>

                <p-select
                    id="categoria"
                    [options]="categories"
                    optionLabel="name"
                    placeholder="Seleccione"
                    formControlName="category"
                    [required]="true" />

                <p-message appErrorMessage [errors]="categoryField.errors" [touched]="categoryField.touched"
                           [dirty]="categoryField.dirty">
                </p-message>
            </div>
        </div>
    </form>

    <app-parks [mode]="process$().type?.code!" (dataOut)="saveForm($event)" />
</p-fluid>
